<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- FIX: interactive-widget=resizes-content prevents iOS keyboard from
         pushing the whole page up (use visualViewport instead) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content, minimal-ui">
    <title>WayChat</title>

    <link rel="apple-touch-icon" href="/static/logo.png">
    <link rel="icon" type="image/png" href="/static/img/icon-192.png">
    <link rel="manifest" href="/static/manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WayChat">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="format-detection" content="telephone=no">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
          as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap">
    </noscript>

    <style>
        /* ── Critical CSS — inlined for zero render-blocking ── */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* FIX SAFARI PANELS: position:fixed on html+body locks the viewport.
           This is exactly what Telegram Web and WhatsApp do.
           Without this, Safari's bottom toolbar creates a black gap. */
        html {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1d1d1e;
            overscroll-behavior: none;
        }

        body {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1d1d1e;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                         "Helvetica Neue", Arial, sans-serif;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
            /* Kill bounce scroll that reveals black background */
            overscroll-behavior: none;
            -webkit-overflow-scrolling: auto;
        }

        /* #root: fills entire fixed viewport — no gaps, no panels */
        #root {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%;
            height: 100%;
            background: #1d1d1e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Fallback for non-fixed-position browsers */
        @supports not (position: fixed) {
            html, body { height: 100dvh; }
            #root { height: 100dvh; position: relative; }
        }

        /* ── Splash screen ── */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 999999;
            background: #1d1d1e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            will-change: opacity;
            transform: translateZ(0);
        }
        #splash-logo-wrap { position: relative; width: 110px; height: 110px; }
        #splash-logo {
            width: 110px; height: 110px;
            border-radius: 26px;
            display: block;
            box-shadow: 0 0 0 1px rgba(16,185,129,.25), 0 12px 48px rgba(16,185,129,.2);
            animation: splashPop .5s cubic-bezier(.34,1.56,.64,1) both;
        }
        #splash-ring {
            position: absolute; inset: -8px;
            border-radius: 34px;
            border: 1.5px solid rgba(16,185,129,.35);
            animation: ringPulse 1.8s ease-in-out infinite;
        }
        #splash-name {
            position: absolute;
            bottom: max(env(safe-area-inset-bottom, 0px), 52px);
            left: 0; right: 0;
            text-align: center;
            font-family: "Pacifico", cursive;
            font-size: 34px; font-weight: 400; letter-spacing: .5px;
            background: linear-gradient(135deg, #fff 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: splashTextIn .6s .15s ease both;
        }

        @keyframes splashPop    { from{opacity:0;transform:scale(.7)}     to{opacity:1;transform:scale(1)} }
        @keyframes splashTextIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        @keyframes ringPulse    { 0%,100%{opacity:.4;transform:scale(1)}  50%{opacity:.8;transform:scale(1.06)} }
        @keyframes slideUpBanner{ from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    </style>
    <style>
        /* ══ Tailwind utility replacements ══════════════════════════
           CDN removed — caused thousands of "padding" JS errors.
           All classes used by WayChat replicated here.
        ══════════════════════════════════════════════════════════ */
        .hidden        { display: none !important; }
        .block         { display: block; }
        .inline-flex   { display: inline-flex; }
        .flex-1        { flex: 1 1 0%; min-width: 0; }
        .flex-col      { display: flex; flex-direction: column; }
        .items-center  { align-items: center; }
        .justify-center{ justify-content: center; }
        .self-center   { align-self: center; }
        /* Sizes */
        .w-full { width: 100%; }
        .h-full { height: 100%; }
        .w-8  { width: 2rem; }    .h-8  { height: 2rem; }
        .w-9  { width: 2.25rem; } .h-9  { height: 2.25rem; }
        .w-10 { width: 2.5rem; }  .h-10 { height: 2.5rem; }
        .w-11 { width: 2.75rem; } .h-11 { height: 2.75rem; }
        .w-12 { width: 3rem; }    .h-12 { height: 3rem; }
        .w-14 { width: 3.5rem; }  .h-14 { height: 3.5rem; }
        .w-16 { width: 4rem; }    .h-16 { height: 4rem; }
        .w-20 { width: 5rem; }    .h-20 { height: 5rem; }
        .w-28 { width: 7rem; }    .h-28 { height: 7rem; }
        .w-screen { width: 100vw; }
        .h-screen { height: 100vh; height: 100dvh; }
        /* Overflow */
        .overflow-hidden { overflow: hidden; }
        .overflow-y-auto { overflow-y: auto; -webkit-overflow-scrolling: touch; }
        /* Border radius */
        .rounded-full { border-radius: 9999px; }
        .rounded-xl   { border-radius: 0.75rem; }
        .rounded-lg   { border-radius: 0.5rem; }
        /* Object */
        .object-cover { object-fit: cover; }
        /* Text */
        .text-lg  { font-size: 1.125rem; }
        .text-xl  { font-size: 1.25rem; }
        .text-2xl { font-size: 1.5rem; }
        .text-3xl { font-size: 1.875rem; }
        .text-4xl { font-size: 2.25rem; }
        /* Shadows */
        .shadow-md    { box-shadow: 0 4px 6px -1px rgba(0,0,0,.35),0 2px 4px -2px rgba(0,0,0,.25); }
        .shadow-inner { box-shadow: inset 0 2px 4px rgba(0,0,0,.3); }
        /* Backgrounds */
        .bg-zinc-800    { background-color: #27272a; }
        .bg-zinc-900\/80 { background-color: rgba(24,24,27,0.8); }
        /* Borders */
        .border-white\/10 { border-color: rgba(255,255,255,0.1); }
        .border-white\/5  { border-color: rgba(255,255,255,0.05); }
        .cursor-pointer { cursor: pointer; }

        /* ══ SAFARI BLACK PANEL NUCLEAR FIX ══════════════════════════════
           With position:fixed on html+body, Safari toolbar can't push content.
           But we still kill any padding that might cause gaps. */
        #root,
        #root > div,
        #root > div > div {
            padding-bottom: 0 !important;
            margin-bottom: 0 !important;
        }

        /* Ensure background is consistent everywhere — no black leaks */
        #root * {
            background-color: inherit;
        }
        /* Reset to transparent for content elements */
        #root p, #root span, #root a, #root button,
        #root input, #root textarea, #root img, #root svg {
            background-color: transparent;
        }

        /* If input-bar единственный элемент которому нужен safe-area —
           он сам прописывает его внутри. Всё остальное — 0. */
        body::after {
            display: none !important;
            content: none !important;
        }

        /* Убиваем любой element с классом safe-area или bottom-bar кроме input */
        [class*="safe-area"]:not([class*="input"]),
        [class*="bottom-bar"]:not([class*="input"]),
        [class*="nav-bar"],
        [class*="tab-bar"] {
            padding-bottom: 0 !important;
            margin-bottom: 0 !important;
        }

        /* Финальный override только для #root прямых детей (screens/views) */
        #root > [class] {
            padding-bottom: 0 !important;
        }

        /* ══ SEARCH BAR — серый фон, только текст "Поиск", без рамок ══ */
        [class*="search"] input,
        [class*="search-bar"] input,
        input[placeholder*="оиск"],
        input[placeholder*="earch"] {
            background: #2c2c2e !important;
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            border-radius: 10px !important;
            color: #fff !important;
        }
        [class*="search-wrap"],
        [class*="search-bar"],
        [class*="search-container"] {
            background: #1d1d1e !important;
            border: none !important;
            box-shadow: none !important;
            border-bottom: none !important;
            border-top: none !important;
        }
        /* Убираем полоску-разделитель под/над поиском */
        [class*="search"]::before,
        [class*="search"]::after {
            display: none !important;
        }

        /* ══ MEDIA без рамок — фото/видео в сообщениях как в TG ══════ */
        [class*="msg"] img,
        [class*="message"] img,
        [class*="bubble"] img,
        [class*="msg"] video,
        [class*="message"] video,
        [class*="bubble"] video {
            border: none !important;
            border-radius: 12px !important;
            box-shadow: none !important;
            outline: none !important;
        }
        /* Убираем padding/border у обёрток медиа */
        [class*="media-wrap"],
        [class*="media-preview"],
        [class*="img-wrap"],
        [class*="photo-wrap"] {
            padding: 0 !important;
            border: none !important;
            background: transparent !important;
        }
    </style>
    <!-- FIX SAFARI PANELS: Force full-viewport lock before any JS runs -->
    <style>
        /* Emergency override — Safari bottom toolbar bleed-through killer */
        html, body {
            /* Prevent any scroll that would reveal black areas */
            position: fixed !important;
            overflow: hidden !important;
            /* Match app background everywhere */
            background-color: #1d1d1e !important;
        }
        /* Kill the black "safe area" padding added by some iOS versions */
        body::before, body::after {
            display: none !important;
        }
        /* Ensure #root takes 100% of the fixed viewport */
        #root {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            /* No height dependency on 100dvh / var(--app-height) needed
               because position:fixed + inset:0 already fills exactly */
            height: 100% !important;
            background-color: #1d1d1e !important;
            /* Prevent any rubber-band bounce */
            overscroll-behavior: none !important;
        }
        /* PWA mode: status bar area is part of viewport, keep dark */
        @media (display-mode: standalone) {
            html, body, #root {
                padding-top: 0 !important;
                /* In PWA the safe-area-inset-top is handled by the app header */
            }
        }
    </style>
</head>
<body style="overscroll-behavior:none;touch-action:pan-x pan-y;">

<div id="splash">
    <div id="splash-logo-wrap">
        <img id="splash-logo" src="/static/logo.png" alt="WayChat"
             onerror="this.style.display='none'">
        <div id="splash-ring"></div>
    </div>
    <div id="splash-name">WayChat</div>
</div>

<div id="root"></div>

<!-- Inject current user data from Flask/Jinja2 -->
<script>
window.currentUser = {{ {
    "id":            current_user.id,
    "name":          current_user.name,
    "username":      current_user.username,
    "avatar":        current_user.avatar or "",
    "phone":         current_user.phone or "",
    "bio":           current_user.bio or "",
    "is_verified":   current_user.is_verified or false,
    "verified_type": current_user.verified_type or ""
} | tojson | safe }};
</script>

<!-- Socket.IO client — loaded synchronously before main.js -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<!-- Patch: viewport/safe-area/FAB/avatars fixes, должен быть ДО main.js -->

<!-- Main application bundle -->
<script src="/static/js/main.js?v=1773926108" defer></script>

<script>
(function () {
    'use strict';

    // ── 1. Viewport height fix (iOS Safari) ─────────────────────────────
    // FIX SAFARI PANELS: With position:fixed on html+body, we use innerHeight.
    // visualViewport shrinks when keyboard opens — we handle that separately.
    // The --app-height is only needed for legacy code that still references it.
    function setAppHeight() {
        var h = window.innerHeight;
        document.documentElement.style.setProperty('--app-height', h + 'px');
        document.documentElement.style.setProperty('--vh', h + 'px');
        document.documentElement.style.setProperty('--dvh', (h * 0.01) + 'px');
    }
    setAppHeight();

    // Re-calculate on resize (orientation change, keyboard)
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setAppHeight, { passive: true });
    }
    window.addEventListener('resize', setAppHeight, { passive: true });
    window.addEventListener('orientationchange', function() {
        setTimeout(setAppHeight, 200);
        setTimeout(setAppHeight, 500);
    }, { passive: true });

    // FIX SAFARI SCROLL-BOUNCE: kill touchmove on body to prevent black reveal
    document.addEventListener('touchmove', function(e) {
        // Allow scrolling inside scrollable elements
        var el = e.target;
        while (el && el !== document.body) {
            var style = window.getComputedStyle(el);
            var overflow = style.overflow + style.overflowY;
            if (overflow.includes('scroll') || overflow.includes('auto')) return;
            el = el.parentElement;
        }
        // Only prevent on body-level
        if (e.target === document.body || e.target === document.documentElement) {
            e.preventDefault();
        }
    }, { passive: false });

    // ── 2. Tailwind CDN REMOVED — caused thousands of padding JS errors

    // ── 3. Splash screen hide ─────────────────────────────────────────────
    var splashDone = false;
    function hideSplash() {
        if (splashDone) return;
        splashDone = true;
        var s = document.getElementById('splash');
        if (!s) return;
        s.style.transition = 'opacity .22s ease';
        s.style.opacity    = '0';
        s.style.pointerEvents = 'none';
        setTimeout(function() {
            if (s && s.parentNode) s.parentNode.removeChild(s);
        }, 240);
    }
    // Poll for root content OR timeout after 2s
    var splashCheckCount = 0;
    var splashTimer = setInterval(function() {
        var r = document.getElementById('root');
        if ((r && r.children.length > 0) || ++splashCheckCount > 66) {
            clearInterval(splashTimer);
            hideSplash();
        }
    }, 30);

    // ── 4. Service Worker registration ───────────────────────────────────
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker
                .register('/sw.js', { scope: '/', updateViaCache: 'none' })
                .then(function(reg) {
                    // FIXED: принудительно активируем новый SW немедленно
                    reg.update().then(function() {
                        if (reg.waiting) {
                            // Новый SW ждёт — активируем его сразу
                            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                        }
                    }).catch(function() {});
                    var swUpdateInterval = setInterval(function() {
                        reg.update().catch(function() {});
                    }, 30 * 60 * 1000);

                    // FIX Task 4c — SCENARIO C: app was closed, opened via deep link
                    // Poll for window.WayChat being ready (main.js may still be loading)
                    var params = new URLSearchParams(window.location.search);
                    if (params.get('sw_action') === 'answer_call') {
                        var callId  = params.get('call_id')  || '';
                        var fromId  = params.get('from_id')  || '';
                        // Clean URL so reload doesn't re-trigger
                        window.history.replaceState({}, '', '/');
                        var pollAttempts = 0;
                        var callPollTimer = setInterval(function() {
                            if (window.WayChat && window.WayChat.handleCallAction) {
                                clearInterval(callPollTimer);
                                window.WayChat.handleCallAction('answer', fromId, callId);
                            } else if (++pollAttempts > 50) { // 5s max
                                clearInterval(callPollTimer);
                                console.warn('[WC] WayChat not ready after 5s — giving up on call auto-open');
                            }
                        }, 100);
                    }

                    // Handle open_chat deep link
                    if (params.get('open_chat')) {
                        var chatId = params.get('open_chat');
                        window.history.replaceState({}, '', '/');
                        var chatPollAttempts = 0;
                        var chatPollTimer = setInterval(function() {
                            if (window.WayChat && window.WayChat.openChatById) {
                                clearInterval(chatPollTimer);
                                window.WayChat.openChatById(parseInt(chatId, 10));
                            } else if (++chatPollAttempts > 50) {
                                clearInterval(chatPollTimer);
                            }
                        }, 100);
                    }
                })
                .catch(function(err) {
                    console.warn('[SW] Registration failed:', err);
                });

            // FIX Task 4 — SCENARIO A/B: relay SW messages to main.js
            // This runs even when app is in background (tab exists)
            navigator.serviceWorker.addEventListener('message', function(event) {
                var msg = event.data;
                if (!msg || !msg.type) return;

                if (msg.type === 'answer_call') {
                    if (window.WayChat && window.WayChat.handleCallAction) {
                        window.WayChat.handleCallAction('answer', msg.from_id, msg.call_id);
                    } else {
                        // Queue it — main.js hasn't loaded yet
                        window._pendingSWCallAction = {
                            action:  'answer',
                            from_id: msg.from_id,
                            call_id: msg.call_id,
                        };
                    }
                } else if (msg.type === 'decline_call') {
                    if (window.WayChat && window.WayChat.handleCallAction) {
                        window.WayChat.handleCallAction('decline', msg.from_id, msg.call_id);
                    }
                } else if (msg.type === 'open_chat') {
                    if (window.WayChat && window.WayChat.openChatById) {
                        window.WayChat.openChatById(msg.chat_id);
                    } else {
                        window._pendingSWOpenChat = msg.chat_id;
                    }
                }
            });
        });
    }

})();
</script>

</body>
</html>
