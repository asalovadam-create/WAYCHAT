<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>WayChat</title>

    <link rel="apple-touch-icon" sizes="180x180" href="/static/logo.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/static/img/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/img/icon-512.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/img/icon-192.png">
    <link rel="manifest" href="/static/manifest.json">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdn.socket.io">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WayChat">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta name="format-detection" content="telephone=no">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

    <!-- preload иконка чтобы грузилась до JS -->
    <link rel="preload" href="/static/img/icon-192.png" as="image">
    <link rel="preload" href="/static/logo.png" as="image">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body, html, #root {
            height: 100%;
            margin: 0; padding: 0;
            background: #000000;
            color: white;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #root { animation: appFadeIn 0.35s ease-out; }

        @keyframes appFadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes slideUpBanner {
            from { opacity:0; transform:translateY(24px); }
            to   { opacity:1; transform:translateY(0); }
        }
        @keyframes slideUpSheet {
            from { opacity:0; transform:translateY(100%); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* ══ SPLASH ══ */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 999999;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
        }
        #splash.hide {
            opacity: 0;
            pointer-events: none;
        }

        /* Логотип по центру */
        #splash-icon {
            width: 110px;
            height: 110px;
            border-radius: 26px;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 0 0 1px rgba(16,185,129,0.25),
                        0 12px 48px rgba(16,185,129,0.2);
        }

        /* Текст внизу экрана */
        #splash-name {
            position: absolute;
            bottom: max(env(safe-area-inset-bottom), 52px);
            left: 0; right: 0;
            text-align: center;
            font-family: 'Pacifico', cursive;
            font-size: 34px;
            font-weight: 400;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="bg-black">

    <!-- ══ SPLASH — без анимации, без вопросиков, мгновенно ══ -->
    <div id="splash">

        <!-- Иконка приложения — preload выше даёт мгновенную загрузку из кэша -->
        <div id="splash-icon">
            <img
                src="/static/img/icon-192.png"
                width="110" height="110"
                style="display:block;width:110px;height:110px;object-fit:cover"
                onerror="this.style.display='none';this.parentNode.querySelector('svg').style.display='block'"
                alt="WayChat">
            <!-- Fallback SVG если иконка не загрузилась -->
            <svg display="none" width="110" height="110" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="100" height="100" fill="#0a0a0e"/>
                <circle cx="50" cy="50" r="36" fill="rgba(16,185,129,0.12)"/>
                <path d="M28 38 C28 33 32 29 37 29 L63 29 C68 29 72 33 72 38 L72 56 C72 61 68 65 63 65 L54 65 L46 73 L46 65 L37 65 C32 65 28 61 28 56 Z" fill="#10b981"/>
                <circle cx="40" cy="47" r="3.5" fill="black" opacity="0.85"/>
                <circle cx="50" cy="47" r="3.5" fill="black" opacity="0.85"/>
                <circle cx="60" cy="47" r="3.5" fill="black" opacity="0.85"/>
            </svg>
        </div>

        <!-- Рукописный шрифт как у Instagram -->
        <div id="splash-name">WayChat</div>

    </div>

    {# FIX: используем getattr чтобы birthday не падал если поле ещё не смигрировано #}
    <div id="user-data-bridge"
         data-user='{{ {
             "id":            current_user.id,
             "name":          current_user.name,
             "username":      current_user.username,
             "avatar":        current_user.avatar,
             "phone":         current_user.phone,
             "bio":           current_user.bio or "",
             "birthday":      current_user.birthday.isoformat() if current_user.birthday else None,
             "is_verified":   current_user.is_verified,
             "verified_type": current_user.verified_type or ""
         } | tojson | safe }}'
         style="display: none;">
    </div>

    <script>
        (function() {
            try {
                var bridge = document.getElementById('user-data-bridge');
                var rawData = bridge ? bridge.dataset.user : null;
                if (!rawData) throw new Error('no bridge');
                window.currentUser = JSON.parse(rawData);
                if (window.currentUser && window.currentUser.id) {
                    try { localStorage.setItem('varto_user_cache', JSON.stringify(window.currentUser)); } catch(e) {}
                }
            } catch (e) {
                try {
                    var cache = localStorage.getItem('varto_user_cache');
                    window.currentUser = cache ? JSON.parse(cache) : { id: 0, name: 'Гость', avatar: '/static/default_avatar.png' };
                } catch(e2) {
                    window.currentUser = { id: 0, name: 'Гость', avatar: '/static/default_avatar.png' };
                }
            }
        })();
    </script>

    <div id="root" class="h-full w-full"></div>

    <script src="/static/js/main.js"></script>

    <script>
    // ── Скрываем splash как только интерфейс готов ──
    (function() {
        function hideSplash() {
            var s = document.getElementById('splash');
            if (!s) return;
            s.classList.add('hide');
            setTimeout(function() { if (s.parentNode) s.remove(); }, 320);
        }
        // Проверяем что root заполнен
        var t = setInterval(function() {
            var r = document.getElementById('root');
            if (r && r.children.length > 0) {
                clearInterval(t);
                setTimeout(hideSplash, 100);
            }
        }, 40);
        // Страховка — максимум 3.5 сек
        setTimeout(function() { clearInterval(t); hideSplash(); }, 3500);
    })();

    // ── SW ──
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js', { scope: '/', updateViaCache: 'none' })
                .catch(function(e) { console.warn('SW:', e); });
        });
    }

    // ══ ANDROID install ══
    var _pwaPrompt = null, _pwaShown = false;
    window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault(); _pwaPrompt = e;
        if (!window.matchMedia('(display-mode: standalone)').matches && !localStorage.getItem('wc_pwa_installed'))
            setTimeout(_showAndroidInstallSheet, 3500);
    });
    window.addEventListener('appinstalled', function() {
        localStorage.setItem('wc_pwa_installed','1');
        document.getElementById('wc-android-sheet')?.remove();
        document.getElementById('wc-android-banner')?.remove();
    });

    function _showAndroidInstallSheet() {
        if (_pwaShown || !_pwaPrompt) return;
        if (localStorage.getItem('wc_pwa_dismissed_at')) {
            if (Date.now() - +localStorage.getItem('wc_pwa_dismissed_at') < 259200000) { _showAndroidInstallBanner(); return; }
        }
        _pwaShown = true;
        var sheet = document.createElement('div');
        sheet.id = 'wc-android-sheet';
        sheet.style.cssText = 'position:fixed;inset:0;z-index:99990;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:flex-end';
        sheet.innerHTML = '<div style="background:#161618;border-radius:28px 28px 0 0;padding:8px 24px calc(env(safe-area-inset-bottom)+28px);width:100%;max-width:480px;border-top:0.5px solid rgba(255,255,255,0.1);animation:slideUpSheet 0.4s cubic-bezier(.32,.72,0,1) forwards"><div style="width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);margin:10px auto 22px"></div><div style="display:flex;align-items:center;gap:16px;margin-bottom:20px"><div style="width:60px;height:60px;border-radius:14px;background:#0a0a0e;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="40" height="40" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="36" fill="rgba(16,185,129,0.15)"/><path d="M28 38 C28 33 32 29 37 29 L63 29 C68 29 72 33 72 38 L72 56 C72 61 68 65 63 65 L54 65 L46 73 L46 65 L37 65 C32 65 28 61 28 56 Z" fill="#10b981"/><circle cx="40" cy="47" r="3.5" fill="black" opacity="0.85"/><circle cx="50" cy="47" r="3.5" fill="black" opacity="0.85"/><circle cx="60" cy="47" r="3.5" fill="black" opacity="0.85"/></svg></div><div><div style="font-size:18px;font-weight:800">WayChat</div><div style="font-size:13px;color:rgba(255,255,255,0.45);margin-top:3px">Установить как приложение</div></div></div><button id="wc-pwa-install" style="width:100%;padding:16px;background:#10b981;border:none;border-radius:16px;color:#000;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:10px">Установить приложение</button><button id="wc-pwa-later" style="width:100%;padding:12px;background:none;border:none;color:rgba(255,255,255,0.3);font-size:14px;cursor:pointer;font-family:inherit">Не сейчас</button></div>';
        document.body.appendChild(sheet);
        sheet.querySelector('#wc-pwa-install').onclick = async function() {
            sheet.remove(); if (!_pwaPrompt) return;
            _pwaPrompt.prompt();
            var r = await _pwaPrompt.userChoice;
            if (r.outcome==='accepted') { localStorage.setItem('wc_pwa_installed','1'); _pwaPrompt=null; }
        };
        sheet.querySelector('#wc-pwa-later').onclick = function() {
            sheet.remove(); localStorage.setItem('wc_pwa_dismissed_at',String(Date.now())); setTimeout(_showAndroidInstallBanner,5000);
        };
        sheet.addEventListener('click', function(e) {
            if (e.target===sheet) { sheet.remove(); localStorage.setItem('wc_pwa_dismissed_at',String(Date.now())); setTimeout(_showAndroidInstallBanner,5000); }
        });
    }

    function _showAndroidInstallBanner() {
        if (!_pwaPrompt || document.getElementById('wc-android-banner')) return;
        var b = document.createElement('div');
        b.id = 'wc-android-banner';
        b.style.cssText = 'position:fixed;bottom:calc(env(safe-area-inset-bottom)+74px);left:12px;right:12px;z-index:9989;background:rgba(22,22,24,0.97);backdrop-filter:blur(20px);border-radius:18px;padding:12px 14px;display:flex;align-items:center;gap:11px;box-shadow:0 8px 40px rgba(0,0,0,0.5);animation:slideUpBanner 0.35s cubic-bezier(.32,.72,0,1) forwards';
        b.innerHTML = '<div style="width:40px;height:40px;border-radius:10px;background:#0a0a0e;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="26" height="26" viewBox="0 0 100 100" fill="none"><path d="M28 38 C28 33 32 29 37 29 L63 29 C68 29 72 33 72 38 L72 56 C72 61 68 65 63 65 L54 65 L46 73 L46 65 L37 65 C32 65 28 61 28 56 Z" fill="#10b981"/><circle cx="40" cy="47" r="3.5" fill="black" opacity="0.85"/><circle cx="50" cy="47" r="3.5" fill="black" opacity="0.85"/><circle cx="60" cy="47" r="3.5" fill="black" opacity="0.85"/></svg></div><div style="flex:1;min-width:0"><div style="font-size:13.5px;font-weight:700;color:#fff">Добавить WayChat на экран</div><div style="font-size:11.5px;color:rgba(255,255,255,0.4);margin-top:1px">Работает как нативное приложение</div></div><button id="wc-banner-add" style="background:#10b981;border:none;border-radius:11px;padding:8px 14px;color:#000;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;font-family:inherit">Добавить</button><button id="wc-banner-x" style="background:none;border:none;color:rgba(255,255,255,0.3);font-size:20px;cursor:pointer;padding:2px 4px">×</button>';
        document.body.appendChild(b);
        b.querySelector('#wc-banner-add').onclick = async function() { b.remove(); if(!_pwaPrompt)return; _pwaPrompt.prompt(); };
        b.querySelector('#wc-banner-x').onclick = function() { b.remove(); };
    }

    // ══ iOS hint ══
    var _isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
    var _isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
    if (_isIOS && !_isStandalone && !localStorage.getItem('wc_ios_hint_v3')) {
        setTimeout(function() {
            localStorage.setItem('wc_ios_hint_v3','1');
            var hint = document.createElement('div');
            hint.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:99989;background:rgba(18,18,20,0.98);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);padding:8px 20px calc(20px + env(safe-area-inset-bottom));border-top:0.5px solid rgba(255,255,255,0.1);animation:slideUpSheet 0.4s cubic-bezier(.32,.72,0,1) forwards';
            hint.innerHTML = '<div style="width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);margin:10px auto 18px"></div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div style="display:flex;align-items:center;gap:12px"><div style="width:44px;height:44px;border-radius:11px;background:#0a0a0e;display:flex;align-items:center;justify-content:center"><svg width="30" height="30" viewBox="0 0 100 100" fill="none"><path d="M28 38 C28 33 32 29 37 29 L63 29 C68 29 72 33 72 38 L72 56 C72 61 68 65 63 65 L54 65 L46 73 L46 65 L37 65 C32 65 28 61 28 56 Z" fill="#10b981"/><circle cx="40" cy="47" r="3.5" fill="black" opacity="0.85"/><circle cx="50" cy="47" r="3.5" fill="black" opacity="0.85"/><circle cx="60" cy="47" r="3.5" fill="black" opacity="0.85"/></svg></div><div><div style="font-size:15px;font-weight:800;color:#fff">Установить WayChat</div><div style="font-size:12px;color:rgba(255,255,255,0.4)">Добавить на экран Домой</div></div></div><button id="wc-ios-close" style="background:rgba(255,255,255,0.1);border:none;border-radius:50%;width:28px;height:28px;color:rgba(255,255,255,0.5);font-size:16px;cursor:pointer">×</button></div><div style="display:flex;flex-direction:column;gap:12px;margin-bottom:16px"><div style="display:flex;align-items:center;gap:12px"><div style="width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M8 12H5a2 2 0 00-2 2v5a2 2 0 002 2h14a2 2 0 002-2v-5a2 2 0 00-2-2h-3M12 3v12M9 6l3-3 3 3" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div style="font-size:14px;color:rgba(255,255,255,0.8)">Нажми <b style="color:#fff">«Поделиться»</b> внизу Safari</div></div><div style="display:flex;align-items:center;gap:12px"><div style="width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px">＋</div><div style="font-size:14px;color:rgba(255,255,255,0.8)">Выбери <b style="color:#fff">«На экран Домой»</b></div></div></div>';
            document.body.appendChild(hint);
            hint.querySelector('#wc-ios-close').onclick = function() { hint.remove(); };
            setTimeout(function() { hint.remove(); }, 15000);
        }, 5000);
    }
    </script>
</body>
</html>
