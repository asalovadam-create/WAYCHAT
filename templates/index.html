<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>WayChat</title>

    <link rel="apple-touch-icon" sizes="180x180" href="/static/logo.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/img/icon-192.png">
    <link rel="manifest" href="/static/manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WayChat">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#111113">
    <meta name="format-detection" content="telephone=no">

    <link rel="preload" href="/static/logo.png" as="image" type="image/png">
    <!-- Pacifico только для splash — async чтобы не блокировать -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">

    <style>
        /* ══ CRITICAL CSS — применяется ДО загрузки JS ══ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            background: #111113;
            /* iOS Safari: используем dvh только если поддерживается */
            height: 100%;
        }

        body {
            background: #111113;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                         "Helvetica Neue", Arial, sans-serif;
            /* НЕ используем 100dvh на body — ломает iOS */
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Запрещаем bounce-эффект */
            overscroll-behavior: none;
            -webkit-overflow-scrolling: auto;
            /* Предотвращаем случайный зум при двойном тапе */
            touch-action: manipulation;
            -webkit-text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased;
        }

        /* Корневой контейнер */
        #root {
            width: 100%;
            height: 100%;
            /* opacity:1 сразу — без анимации которая может застрять */
            opacity: 1;
            background: #111113;
        }

        /* Splash поверх всего */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 999999;
            background: #111113;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #splash-icon {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 0 0 1px rgba(16,185,129,0.2),
                        0 8px 32px rgba(16,185,129,0.15);
        }
        #splash-name {
            position: absolute;
            bottom: max(env(safe-area-inset-bottom, 0px), 44px);
            left: 0; right: 0;
            text-align: center;
            font-family: "Pacifico", cursive;
            font-size: 32px;
            background: linear-gradient(135deg, #ffffff 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>

    <!-- SPLASH -->
    <div id="splash">
        <div id="splash-icon">
            <img src="/static/logo.png"
                 width="100" height="100"
                 style="display:block;width:100%;height:100%;object-fit:cover"
                 alt="WayChat"
                 onerror="this.style.display='none'">
        </div>
        <div id="splash-name">WayChat</div>
    </div>

    <!-- User data из Flask (server-side) -->
    <div id="user-data-bridge"
         data-user='{{ {"id": current_user.id, "name": current_user.name, "username": current_user.username, "avatar": current_user.avatar, "phone": current_user.phone or "", "bio": current_user.bio or "", "is_verified": current_user.is_verified, "verified_type": current_user.verified_type or "", "birthday": current_user.birthday.isoformat() if current_user.birthday else None} | tojson | safe }}'
         style="display:none"></div>

    <!-- Root для React-like рендера -->
    <div id="root"></div>

    <!-- ═══ ИНИЦИАЛИЗАЦИЯ ПОЛЬЗОВАТЕЛЯ (синхронная!) ═══ -->
    <script>
    // Этот скрипт выполняется СИНХРОННО до загрузки main.js
    // Устанавливает window.currentUser чтобы init() не ждал
    (function() {
        var u = null;

        // 1) Сервер дал данные
        try {
            var el = document.getElementById('user-data-bridge');
            if (el) u = JSON.parse(el.dataset.user);
        } catch(e) {}

        // 2) localStorage кэш
        if (!u || !u.id) {
            try {
                var c = localStorage.getItem('waychat_user_cache')
                     || localStorage.getItem('varto_user_cache');
                if (c) u = JSON.parse(c);
            } catch(e) {}
        }

        if (u && u.id > 0) {
            window.currentUser = u;
            // Обновляем кэш
            try { localStorage.setItem('waychat_user_cache', JSON.stringify(u)); } catch(e) {}
        } else {
            // Нет данных — редирект на логин (тихий, без задержки)
            window.currentUser = null;
        }
    })();
    </script>

    <!-- Tailwind (async — не блокирует парсинг) -->
    <script>
    // Загружаем Tailwind асинхронно чтобы не блокировать рендер
    (function(){
        var s = document.createElement('script');
        s.src = 'https://cdn.tailwindcss.com';
        s.async = true;
        document.head.appendChild(s);
    })();
    </script>

    <!-- Socket.IO (нужен до main.js) -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <!-- Lucide icons (async) -->
    <script>
    (function(){
        var s = document.createElement('script');
        s.src = 'https://unpkg.com/lucide@latest';
        s.async = true;
        document.head.appendChild(s);
    })();
    </script>

    <!-- Основной код приложения -->
    <script src="/static/js/main.js"></script>

    <!-- ═══ SPLASH HIDE + SERVICE WORKER ═══ -->
    <script>
    (function() {
        var splashHidden = false;

        function hideSplash() {
            if (splashHidden) return;
            splashHidden = true;
            var s = document.getElementById('splash');
            if (!s) return;
            // Плавное исчезновение
            s.style.transition = 'opacity 0.25s ease';
            s.style.opacity = '0';
            s.style.pointerEvents = 'none';
            setTimeout(function() {
                if (s && s.parentNode) s.parentNode.removeChild(s);
            }, 280);
        }

        // Скрываем как только root получил содержимое
        var attempts = 0;
        var t = setInterval(function() {
            attempts++;
            var r = document.getElementById('root');
            if (r && r.children.length > 0) {
                clearInterval(t);
                hideSplash();
            }
            // Fallback: максимум 2 секунды
            if (attempts > 66) {
                clearInterval(t);
                hideSplash();
            }
        }, 30);

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js', { scope: '/' })
                    .catch(function(e) { console.warn('SW:', e); });
            });
        }
    })();

    // iOS PWA install hint
    (function() {
        var _isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        var _isStandalone = window.navigator.standalone === true;
        if (_isIOS && !_isStandalone && !localStorage.getItem('wc_ios_hint_v4')) {
            setTimeout(function() {
                localStorage.setItem('wc_ios_hint_v4', '1');
                var hint = document.createElement('div');
                hint.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:99989;'
                    + 'background:rgba(18,18,20,0.97);backdrop-filter:blur(28px);'
                    + '-webkit-backdrop-filter:blur(28px);'
                    + 'padding:16px 20px calc(20px + env(safe-area-inset-bottom,0px));'
                    + 'border-top:0.5px solid rgba(255,255,255,0.1);'
                    + 'color:white;font-family:-apple-system,sans-serif;'
                    + 'animation:slideUpBanner 0.4s ease forwards;';
                hint.innerHTML = '<div style="font-size:15px;font-weight:700;margin-bottom:6px">Добавить WayChat на экран</div>'
                    + '<div style="font-size:13px;color:rgba(255,255,255,.55);margin-bottom:14px">'
                    + 'Нажми <b style="color:white">Поделиться</b> → <b style="color:white">На экран «Домой»</b></div>'
                    + '<button onclick="this.parentNode.remove()" style="width:100%;padding:12px;background:var(--accent,#10b981);'
                    + 'border:none;border-radius:14px;color:#000;font-size:15px;font-weight:700;cursor:pointer">Понял</button>';
                document.body.appendChild(hint);
                setTimeout(function() { if (hint.parentNode) hint.parentNode.removeChild(hint); }, 12000);
            }, 4000);
        }
    })();
    </script>

</body>
</html>
