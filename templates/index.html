<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>WayChat</title>

    <link rel="apple-touch-icon" sizes="180x180" href="/static/logo.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/logo.png">
    <link rel="manifest" href="/static/manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WayChat">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#111113">
    <meta name="format-detection" content="telephone=no">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link rel="preload" href="/static/logo.png" as="image" type="image/png">

    <style>
        *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        html,body { width:100%; height:100%; background:#111113; overflow:hidden; overscroll-behavior:none; }
        body { color:#fff; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif; -webkit-text-size-adjust:100%; -webkit-font-smoothing:antialiased; touch-action:manipulation; }
        #root { width:100%; height:100%; background:#111113; }

        #splash { position:fixed; inset:0; z-index:999999; background:#111113; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #splash-logo-wrap { position:relative; width:110px; height:110px; }
        #splash-logo { width:110px; height:110px; border-radius:26px; display:block; box-shadow:0 0 0 1px rgba(16,185,129,.25), 0 12px 48px rgba(16,185,129,.2); animation:splashPop .5s cubic-bezier(.34,1.56,.64,1) both; }
        #splash-ring { position:absolute; inset:-8px; border-radius:34px; border:1.5px solid rgba(16,185,129,.35); animation:ringPulse 1.8s ease-in-out infinite; }
        #splash-name { position:absolute; bottom:max(env(safe-area-inset-bottom,0px),52px); left:0; right:0; text-align:center; font-family:"Pacifico",cursive; font-size:34px; font-weight:400; letter-spacing:.5px; background:linear-gradient(135deg,#fff 0%,#10b981 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:splashTextIn .6s .15s ease both; }
        @keyframes splashPop { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }
        @keyframes splashTextIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        @keyframes ringPulse { 0%,100%{opacity:.4;transform:scale(1)} 50%{opacity:.8;transform:scale(1.06)} }
        @keyframes slideUpBanner { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    </style>
</head>
<body>

<div id="splash">
    <div id="splash-logo-wrap">
        <img id="splash-logo" src="/static/logo.png" alt="WayChat" onerror="this.style.display='none'">
        <div id="splash-ring"></div>
    </div>
    <div id="splash-name">WayChat</div>
</div>

<div id="root"></div>

<!-- Данные пользователя от Flask -->
<script id="user-data-bridge" type="application/json">
{{ user_data | tojson | safe }}
</script>

<!-- КРИТИЧНО: window.currentUser до main.js -->
<script>
(function() {
    var u = null;
    try {
        var el = document.getElementById('user-data-bridge');
        if (el) u = JSON.parse(el.textContent || el.innerText || '{}');
    } catch(e) {}
    if (!u || !u.id) {
        try {
            var c = localStorage.getItem('waychat_user_cache') || localStorage.getItem('varto_user_cache');
            if (c) u = JSON.parse(c);
        } catch(e) {}
    }
    if (u && u.id > 0) {
        window.currentUser = u;
        try { localStorage.setItem('waychat_user_cache', JSON.stringify(u)); } catch(e) {}
    } else {
        window.currentUser = null;
    }
})();
</script>

<!-- Socket.IO до main.js -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<!-- Диагностика: что видит браузер ДО main.js -->
<script>
(function(){
  var u=window.currentUser;
  console.log('[WC] PRE-INIT | currentUser=',JSON.stringify(u),
    '| valid=',!!(u&&u.id>0),'| ts=',Date.now());
  if(!u||!u.id||u.id<=0)
    console.warn('[WC] WARNING: window.currentUser is missing — Flask session issue!');
})();
</script>

<!-- Основной JS -->
<script src="/static/js/main.js"></script>

<!-- Некритичные скрипты — после main.js -->
<script>
(function() {
    // Tailwind async
    var t = document.createElement('script');
    t.src = 'https://cdn.tailwindcss.com';
    t.async = true;
    document.head.appendChild(t);

    // Lucide async
    var l = document.createElement('script');
    l.src = 'https://unpkg.com/lucide@latest';
    l.async = true;
    document.head.appendChild(l);
})();

// Скрываем splash когда root получил содержимое
(function() {
    var done = false;
    function hideSplash() {
        if (done) return;
        done = true;
        var s = document.getElementById('splash');
        if (!s) return;
        s.style.transition = 'opacity 0.25s ease';
        s.style.opacity = '0';
        s.style.pointerEvents = 'none';
        setTimeout(function() { if (s && s.parentNode) s.parentNode.removeChild(s); }, 270);
    }
    var n = 0;
    var timer = setInterval(function() {
        n++;
        var r = document.getElementById('root');
        if (r && r.children.length > 0) { clearInterval(timer); hideSplash(); return; }
        if (n > 60) { clearInterval(timer); hideSplash(); }
    }, 30);
})();

// Service Worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function() {});
    });
}

// iOS "Добавить на экран" подсказка
(function() {
    var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    var isStandalone = window.navigator.standalone === true;
    if (!isIOS || isStandalone || localStorage.getItem('wc_ios_hint_v4')) return;
    setTimeout(function() {
        localStorage.setItem('wc_ios_hint_v4', '1');
        var hint = document.createElement('div');
        hint.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:99989;background:rgba(18,18,20,.97);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);padding:16px 20px calc(20px + env(safe-area-inset-bottom,0px));border-top:.5px solid rgba(255,255,255,.1);color:white;font-family:-apple-system,sans-serif;animation:slideUpBanner .4s ease forwards';
        hint.innerHTML = '<div style="font-size:15px;font-weight:700;margin-bottom:6px">Добавить WayChat на экран</div>'
            + '<div style="font-size:13px;color:rgba(255,255,255,.55);margin-bottom:14px">Нажми <b style="color:white">Поделиться</b> → <b style="color:white">На экран «Домой»</b></div>'
            + '<button style="width:100%;padding:12px;background:#10b981;border:none;border-radius:14px;color:#000;font-size:15px;font-weight:700;cursor:pointer">Понял, спасибо!</button>';
        hint.querySelector('button').onclick = function() { hint.remove(); };
        document.body.appendChild(hint);
        setTimeout(function() { if (hint.parentNode) hint.remove(); }, 14000);
    }, 4500);
})();

// Android PWA install
(function() {
    var prompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        prompt = e;
        if (!window.matchMedia('(display-mode: standalone)').matches && !localStorage.getItem('wc_pwa_installed')) {
            setTimeout(showAndroidBanner, 3500);
        }
    });
    window.addEventListener('appinstalled', function() {
        localStorage.setItem('wc_pwa_installed', '1');
        var b = document.getElementById('wc-android-banner');
        if (b) b.remove();
    });
    function showAndroidBanner() {
        if (document.getElementById('wc-android-banner')) return;
        var banner = document.createElement('div');
        banner.id = 'wc-android-banner';
        banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:99989;background:rgba(18,18,20,.97);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);padding:16px 20px calc(20px + env(safe-area-inset-bottom,0px));border-top:.5px solid rgba(255,255,255,.1);color:white;font-family:-apple-system,sans-serif;animation:slideUpBanner .4s ease forwards';
        banner.innerHTML = '<div style="font-size:15px;font-weight:700;margin-bottom:6px">Установить WayChat</div>'
            + '<div style="font-size:13px;color:rgba(255,255,255,.55);margin-bottom:14px">Добавь приложение на главный экран</div>'
            + '<div style="display:flex;gap:10px">'
            + '<button id="wc-install-btn" style="flex:1;padding:12px;background:#10b981;border:none;border-radius:14px;color:#000;font-size:15px;font-weight:700;cursor:pointer">Установить</button>'
            + '<button id="wc-cancel-btn" style="padding:12px 18px;background:rgba(255,255,255,.1);border:none;border-radius:14px;color:white;font-size:15px;cursor:pointer">Не сейчас</button>'
            + '</div>';
        document.getElementById('wc-install-btn').onclick = function() {
            if (prompt) {
                prompt.prompt();
                prompt.userChoice.then(function() {
                    localStorage.setItem('wc_pwa_installed', '1');
                    banner.remove();
                });
            }
        };
        document.getElementById('wc-cancel-btn').onclick = function() { banner.remove(); };
        document.body.appendChild(banner);
        setTimeout(function() { if (banner.parentNode) banner.remove(); }, 15000);
    }
})();
</script>

</body>
</html>
