# ══════════════════════════════════════════════════════════
#  NGINX — VartoChat Production Config 2026
#  sudo cp nginx.conf /etc/nginx/sites-available/vartochat
#  sudo ln -s /etc/nginx/sites-available/vartochat /etc/nginx/sites-enabled/
#  sudo nginx -t && sudo systemctl reload nginx
# ══════════════════════════════════════════════════════════

# Rate limiting зоны
limit_req_zone $binary_remote_addr zone=login:10m     rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m       rate=30r/s;
limit_req_zone $binary_remote_addr zone=websocket:10m rate=10r/s;

# Upstream для gunicorn/uvicorn
upstream vartochat_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP → HTTPS редирект
server {
    listen 80;
    server_name your_domain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — основной сервер
server {
    listen 443 ssl http2;
    server_name your_domain.com;

    # SSL (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/your_domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your_domain.com/privkey.pem;

    # Современные TLS настройки
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options            DENY always;
    add_header X-Content-Type-Options     nosniff always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

    # ══ CORS для iOS / Cloudflare Tunnel ══
    # iOS Safari требует SameSite=None + Secure для cross-site cookies
    add_header Access-Control-Allow-Origin      "$http_origin" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Content-Type, Authorization, X-Requested-With" always;

    # Preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # Максимальный размер файла (для медиа загрузок)
    client_max_body_size 60M;
    client_body_timeout  120s;

    # ══ WEBSOCKET ══
    location /ws {
        proxy_pass         http://vartochat_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout для WS (достаточно большой)
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 10s;

        # Rate limiting для WS
        limit_req zone=websocket burst=20 nodelay;
    }

    # Socket.io compat
    location /socket.io/ {
        proxy_pass         http://vartochat_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ══ LOGIN — строгий rate limit ══
    location /api/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://vartochat_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ══ STATIC — кэш ══
    location /static/ {
        alias /path/to/vartochat/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;

        # Защита от directory traversal
        location ~* \.(py|sh|sql|env)$ {
            deny all;
        }
    }

    # ══ API — общий rate limit ══
    location / {
        limit_req zone=api burst=50 nodelay;

        proxy_pass         http://vartochat_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeout
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # Логи
    access_log /var/log/nginx/vartochat_access.log;
    error_log  /var/log/nginx/vartochat_error.log warn;
}